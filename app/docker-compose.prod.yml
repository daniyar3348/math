# Esep+ production stack: app (Next.js + SQLite) + Caddy (auto-HTTPS).
# 1. cp .env.example .env  → заполни DOMAIN, ADMIN_EMAIL, ADMIN_PASSWORD
# 2. docker compose -f docker-compose.prod.yml up -d --build
services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data          # SQLite живёт на хосте → переживает пересборки
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data           # TLS-сертификаты
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:

# Render Blueprint — деплой Esep+ одним кликом.
# В дашборде Render: New + → Blueprint → выбрать репозиторий daniyar3348/math →
# задать ADMIN_PASSWORD (спросит сам) → Apply.
#
# ВАЖНО про тарифы:
#  - plan: free — сервис засыпает после 15 мин простоя (первый запрос ~30-60 c),
#    диск ЭФЕМЕРНЫЙ: SQLite-база сбрасывается при передеплое/перезапуске.
#    Годится для витрины/демо.
#  - Для реальных учеников: plan: starter + раскомментировать блок disk ниже —
#    тогда data/ переживает всё.

services:
  - type: web
    name: esep
    runtime: docker
    repo: https://github.com/daniyar3348/math
    dockerfilePath: ./app/Dockerfile
    dockerContext: ./app
    plan: free
    region: frankfurt          # ближайший к Казахстану регион Render
    healthCheckPath: /api/health
    autoDeploy: true           # пуш в main → автодеплой
    envVars:
      - key: ADMIN_EMAIL
        value: admin@esep.kz
      - key: ADMIN_PASSWORD
        sync: false            # Render спросит значение при создании — задай сильный!
      - key: SEED_DEMO
        value: "1"             # на free-тарифе БД эфемерна — демо-ученики оживляют рейтинг
      - key: PAYMENTS_MODE
        value: sandbox         # «оплата» работает в демо-режиме; live — только с вебхуком Kaspi
    # ——— Для платного тарифа (Starter): постоянное хранилище БД ———
    # disk:
    #   name: esep-data
    #   mountPath: /app/data
    #   sizeGB: 1
